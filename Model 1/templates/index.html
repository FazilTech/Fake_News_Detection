<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fake News Detector</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f9f9f9;
            text-align: center;
            margin-top: 80px;
        }
        textarea {
            width: 60%;
            height: 120px;
            font-size: 16px;
            padding: 10px;
        }
        button {
            background: #4CAF50;
            color: white;
            padding: 10px 25px;
            border: none;
            font-size: 16px;
            margin-top: 10px;
            cursor: pointer;
        }
        button:hover {
            background: #45a049;
        }
        .result {
            margin-top: 30px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <h1>📰 Fake News Detection Portal</h1>
    <form method="POST" action="/predict">
        <textarea name="news" placeholder="Enter news statement here..."></textarea><br>
        <button type="submit">Check News</button>
    </form>
    <div class="result">
        {% if prediction_text %}
            <p>{{ prediction_text | safe }}</p>
        {% endif %}
    </div>
</body>
</html>
